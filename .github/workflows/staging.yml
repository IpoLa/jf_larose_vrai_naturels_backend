name: Backend JF LAROSE NATURELS - Staging (dev → preprod)

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend/**'

jobs:
  build-and-deploy:
    name: Build & Deploy Backend → Preprod FTP
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔨 Build
        working-directory: ./backend
        run: npm run build

      - name: 🧪 Prisma Generate (if needed)
        working-directory: ./backend
        run: npm run prisma:generate

      - name: 🧪 Prisma Seed
        working-directory: ./backend
        run: npm run prisma:seed

      # Optional: run tests if you have them
      # - name: 🧪 Run tests
      #   working-directory: ./backend
      #   run: npm test

      - name: 🧹 Clean empty files (avoid FTPS timeout)
        run: find backend/dist -type f -empty -delete

      - name: 🚀 Deploy to Preprod FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER_PRE }}
          username: ${{ secrets.FTP_USERNAME_PRE }}
          password: ${{ secrets.FTP_PASSWORD_PRE }}
          protocol: ftps
          port: 21
          local-dir: ./backend/dist/
          server-dir: /backend/les-vrais-naturels-backend/
          passive: true
          security: loose
          timeout: 300000
          keepalive: 15000
          max-connections: 2
          retries: 5
          retry-delay: 15s
          state-name: .ftp-deploy-sync-state-backend-pre.json
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/**
            **/.DS_Store
            **/.vscode/**
            **/.idea/**
            **/Thumbs.db