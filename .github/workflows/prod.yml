name: Backend - Production (main → prod)

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'

jobs:
  build-and-deploy:
    name: Build → Prisma → Deploy to Production FTP
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma Migrate (deploy)
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Prisma Seed (optional - often skipped in prod)
        if: false   # ← usually disabled in production - remove if you want it
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npm run prisma:seed

      - name: Clean empty files
        run: find dist -type f -empty -delete || true

      - name: Deploy to Production FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER_PROD }}
          username: ${{ secrets.FTP_USERNAME_PROD }}
          password: ${{ secrets.FTP_PASSWORD_PROD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /backend/les-vrais-naturels-backend/
          passive: true
          security: loose
          timeout: 300000
          keepalive: 15000
          max-connections: 2
          retries: 5
          retry-delay: 15s
          state-name: .ftp-deploy-sync-state-prod.json
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/**