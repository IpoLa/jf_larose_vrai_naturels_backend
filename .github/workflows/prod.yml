name: Backend — prod (main → cPanel)
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    name: Build → Deploy to cPanel
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      # No binary engine needed — driver adapter only
      PRISMA_CLI_QUERY_ENGINE_TYPE: none
      PRISMA_SCHEMA_ENGINE_TYPE: binary # only for migrations
      PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "1"
    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
      # ── 2. Node 20 ────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      # ── 3. Install all deps ───────────────────────────────────────────────
      - name: Install all dependencies
        run: npm ci
      # ── 4. Generate Prisma client (engineType=none → no binary download) ──
      - name: Generate Prisma Client
        run: npx prisma generate
      # ── 5. Build NestJS ───────────────────────────────────────────────────
      - name: Build
        run: npm run build
      # ── 6. Verify build ───────────────────────────────────────────────────
      - name: Verify dist
        run: |
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js not found!"
            exit 1
          fi
          echo "✅ dist/main.js found"
      # ── 7. Assemble deploy package ────────────────────────────────────────
      - name: Assemble deploy package
        run: |
          set -e
          mkdir -p deploy
          # Compiled app
          cp -r dist deploy/
          cp -r prisma deploy/
          cp package.json package-lock.json deploy/
          cp app.js deploy/ 2>/dev/null || true
          # Install production deps (no scripts needed — no engine to generate)
          cd deploy
          npm ci --omit=dev --ignore-scripts --prefer-offline
          cd ..
          # Copy the generated Prisma client (from custom output path)
          rm -rf deploy/src/generated/prisma
          mkdir -p deploy/src/generated
          cp -r src/generated/prisma deploy/src/generated/prisma
          # Remove Prisma CLI from deploy (only needed for migrations, not runtime)
          rm -rf deploy/node_modules/prisma
          rm -rf deploy/node_modules/@prisma/engines
          echo "── Deploy size ──"
          du -sh deploy/
      # ── 8. Deploy via FTPS ────────────────────────────────────────────────
      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          passive: true
          security: loose
          timeout: 900000
          local-dir: ./deploy/
          server-dir: /
          dangerous-clean-slate: false
          state-name: .ftp-deploy-backend-prod.json
          exclude: |
            **/.git*
            **/.env*
            **/.DS_Store
            **/Thumbs.db
            **/*.tsbuildinfo
            **/node_modules/**
            **/node_modules/**/test/**
            **/node_modules/**/tests/**
            **/node_modules/**/*.md
            **/node_modules/**/.cache/**