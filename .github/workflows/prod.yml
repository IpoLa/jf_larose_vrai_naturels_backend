name: Backend - prod (main → prod)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Build → Deploy to cPanel prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS
        run: npm run build

      - name: Prisma Generate
        run: npx prisma generate

      - name: Verify build
        run: |
          ls -la dist/
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js not found!"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp package.json deploy/
          cp -r prisma deploy/ 2>/dev/null || true   # Prisma client if needed

      - name: Deploy to cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./deploy/
          server-dir: /
          dangerous-clean-slate: false
          passive: true
          security: loose
          timeout: 300000
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/**
            **/.DS_Store