name: Backend - prod (dev → dev)

on:
  push:
    branches: [ dev ]

jobs:
  build-and-deploy:
    name: Build → Deploy to cPanel preprod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (with multi-target support)
        run: npx prisma generate

      - name: Build NestJS
        run: npm run build

      - name: Verify build artifacts
        run: |
          ls -la dist/
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js not found!"
            exit 1
          fi
          if [ ! -d node_modules/.prisma/client ] || [ -z "$(ls node_modules/.prisma/client/libquery_engine-*.node 2>/dev/null)" ]; then
            echo "❌ Prisma engines missing after generate!"
            exit 1
          fi
          echo "✅ Prisma engines present (including rhel-openssl-3.0.x hopefully)"

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp package.json package-lock.json deploy/
          cp -r prisma deploy/ 2>/dev/null || true
          # Copy pre-generated Prisma client engines (critical!)
          cp -r node_modules/.prisma deploy/node_modules/.prisma 2>/dev/null || true
          # Include other necessary node_modules parts if needed, but prefer prune below

      - name: Install production dependencies only
        working-directory: ./deploy
        run: |
          npm ci --omit=dev --ignore-scripts --prefer-offline --production
          # Ensures no dev deps, no postinstall scripts that might try to generate again

      - name: Deploy to cPanel (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server:       ${{ secrets.FTP_SERVER_PRE }}
          username:     ${{ secrets.FTP_USERNAME_PRE }}
          password:     ${{ secrets.FTP_PASSWORD_PRE }}
          protocol:     ftps
          port:         21
          local-dir:    ./deploy/
          server-dir:   /   # Change to /api/ or /backend/ if you use subfolder
          dangerous-clean-slate: true  # Incremental = safer
          passive:      true
          security:     loose
          timeout:      600000          # Longer for large node_modules
          exclude: |
            **/.git*
            **/.env*
            **/.DS_Store
            **/Thumbs.db
            **/*.tsbuildinfo
            **/node_modules/**
            **/node_modules/.prisma/client/libquery_engine-*  # Exclude wrong engines, keep only needed
            **/node_modules/prisma  # CLI not needed in prod
          state-name: .ftp-deploy-backend-prod.json