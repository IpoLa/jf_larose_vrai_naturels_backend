name: Backend - Preprod (dev → staging)

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    name: Build → Prisma → Deploy to Preprod FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prisma Generate
        run: npx prisma generate

      # ── Sanity check: fail fast if main.js is not where expected ──────────
      - name: Verify dist structure
        run: |
          echo "── dist/ contents ──"
          find dist -type f | sort
          echo "────────────────────"
          if [ ! -f dist/main.js ]; then
            echo "❌ dist/main.js not found! Build output is nested (rootDir misconfigured)."
            exit 1
          fi
          echo "✅ dist/main.js found."

      - name: Clean empty files
        run: find dist -type f -empty -delete || true

      - name: Deploy to Preprod FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER_PRE }}
          username: ${{ secrets.FTP_USERNAME_PRE }}
          password: ${{ secrets.FTP_PASSWORD_PRE }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          passive: true
          security: loose
          timeout: 300000
          keepalive: 15000
          max-connections: 2
          retries: 5
          retry-delay: 15s
          dangerous-clean-slate: true
          state-name: .ftp-deploy-sync-state-preprod.json
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/**
            **/.DS_Store
            **/.vscode/**
            **/.idea/**
            **/Thumbs.db