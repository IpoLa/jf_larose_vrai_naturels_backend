name: Backend - Preprod (dev → staging)

on:
  push:
    branches:
      - dev
    # Remove paths filter completely - or use root-level patterns if needed
    # paths: []   ← comment out or delete this section

jobs:
  build-and-deploy:
    name: Build → Prisma → Deploy to Preprod FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma Migrate (deploy)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Prisma Seed
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npm run prisma:seed

      - name: Clean empty files
        run: find dist -type f -empty -delete || true

      - name: Deploy to Preprod FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER_PRE }}
          username: ${{ secrets.FTP_USERNAME_PRE }}
          password: ${{ secrets.FTP_PASSWORD_PRE }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /backend/les-vrais-naturels-backend/
          passive: true
          security: loose
          timeout: 300000
          keepalive: 15000
          max-connections: 2
          retries: 5
          retry-delay: 15s
          state-name: .ftp-deploy-sync-state-preprod.json
          exclude: |
            **/.git*
            **/.env*
            **/node_modules/**
            **/.DS_Store
            **/.vscode/**
            **/.idea/**
            **/Thumbs.db